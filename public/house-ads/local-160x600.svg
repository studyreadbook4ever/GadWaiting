<svg xmlns="http://www.w3.org/2000/svg" width="160" height="600" viewBox="0 0 160 600" role="img" aria-labelledby="title desc">
  <title id="title">GadWaiting fallback ad 160 by 600</title>
  <desc id="desc">A local advertisement placeholder for ad approval waiting state.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.45" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="160" height="600" fill="url(#g)"/>
  <rect x="10" y="10" width="140" height="580" rx="7" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.34)"/>
  <text x="20" y="82" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="700">Gad</text>
  <text x="20" y="106" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="700">Waiting...</text>
  <text x="20" y="142" fill="#dbeafe" font-family="Arial, sans-serif" font-size="12">Replace with</text>
