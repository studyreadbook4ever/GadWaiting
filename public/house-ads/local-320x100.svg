<svg xmlns="http://www.w3.org/2000/svg" width="320" height="100" viewBox="0 0 320 100" role="img" aria-labelledby="title desc">
  <title id="title">GadWaiting fallback ad 320 by 100</title>
  <desc id="desc">A local advertisement placeholder for ad approval waiting state.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.52" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="320" height="100" fill="url(#g)"/>
  <rect x="10" y="10" width="300" height="80" rx="7" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.32)"/>
  <text x="24" y="45" fill="#ffffff" font-family="Arial, sans-serif" font-size="21" font-weight="700">GadWaiting...</text>
  <text x="24" y="68" fill="#dbeafe" font-family="Arial, sans-serif" font-size="13">Replace with your own 320 x 100 image.</text>
